<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#060910" />
		<meta name="referrer" content="strict-origin-when-cross-origin" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Before first paint: flag JS availability (scroll-reveal) and restore theme.
			document.documentElement.classList.add('js');
			try {
				if (localStorage.getItem('theme') === 'light') {
					document.documentElement.setAttribute('data-theme', 'light');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-page font-sans text-fg antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
